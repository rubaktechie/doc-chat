server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Matches the backend's 25 MB upload limit (routes/documents.js); nginx's
  # 1 MB default would otherwise reject uploads with 413 before they reach it.
  client_max_body_size 26m;

  # SPA routing: fall back to index.html for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the backend service. SSE (chat) needs buffering off.
  location /api/ {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
  }
}
